<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceMaster v2.1 ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f1f5f9; transition: background 0.3s; }
        .dark-mode { background: #020617; color: #f8fafc; }
        .card { background: white; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .dark-mode .card { background: #1e293b; border-color: #334155; }
        .loading-spinner { border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid currentColor; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen py-8 px-4" id="bodyTag">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-3 rounded-2xl text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-slate-800 dark:text-white uppercase">Voice<span class="text-indigo-600">Master</span></h1>
                    <span class="text-[10px] text-slate-400">Version 2.1 - Includes Download Button</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button id="apiKeyBtn" class="px-4 py-2 rounded-xl card text-xs font-bold hover:bg-indigo-50 transition-colors">🔑 הגדר מפתח API</button>
                <div id="apiKeyPopover" class="hidden absolute left-10 mt-40 w-72 p-4 card rounded-2xl shadow-2xl z-50">
                    <h4 class="font-bold text-sm mb-2">Gemini API Key</h4>
                    <input id="apiKeyInput" type="password" class="w-full p-2 text-xs bg-slate-50 dark:bg-slate-800 rounded-lg mb-2 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="AIzaSy...">
                    <button id="saveApiKey" class="w-full py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold">שמור מפתח</button>
                </div>
                <button id="toggleDark" class="p-3 rounded-xl card hover:bg-slate-100 transition-colors">🌓</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6">
                <div class="card p-6 rounded-[2rem] shadow-sm">
                    <h3 class="font-bold mb-4 text-indigo-900 dark:text-indigo-300 text-sm">יצירת תוכן חכמה (AI)</h3>
                    <div class="flex gap-2">
                        <input id="promptInput" type="text" class="flex-grow p-3 bg-slate-50 dark:bg-slate-800 rounded-xl text-sm border-none outline-none focus:ring-2 focus:ring-indigo-500" placeholder="על מה לכתוב?">
                        <button id="magicWriteBtn" class="p-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-all flex items-center justify-center min-w-[48px]">
                            <span id="magicIcon">✨</span>
                            <div id="magicLoader" class="loading-spinner hidden"></div>
                        </button>
                    </div>
                </div>

                <div class="card p-7 rounded-[2.5rem] shadow-lg border-none">
                    <textarea id="textInput" rows="6" class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-500 transition-all text-lg dark:text-white mb-4" placeholder="הכנס טקסט כאן..."></textarea>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <select id="voiceSelect" class="w-full p-3 bg-slate-100 dark:bg-slate-800 dark:text-white rounded-xl text-xs font-bold outline-none">
                            <option value="Zephyr">Zephyr (גבר)</option>
                            <option value="Kore">Kore (אישה)</option>
                        </select>
                        <select id="styleSelect" class="w-full p-3 bg-slate-100 dark:bg-slate-800 dark:text-white rounded-xl text-xs font-bold outline-none">
                            <option value="natural">טבעי</option>
                            <option value="professional">מקצועי</option>
                        </select>
                    </div>

                    <button id="generateBtn" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-3">
                        <span id="btnText">הפק קריינות</span>
                        <div id="btnLoader" class="loading-spinner hidden"></div>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-7">
                <h2 class="text-xl font-bold mb-4 dark:text-white px-2">הקלטות</h2>
                <div id="tracksContainer" class="space-y-4">
                    <div id="noTracks" class="text-center py-20 border-2 border-dashed border-slate-300 dark:border-slate-800 rounded-[2.5rem] text-slate-400 font-bold">ההיסטוריה תופיע כאן</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-8 px-6 py-3 rounded-xl shadow-2xl opacity-0 transition-all pointer-events-none z-50 text-white bg-indigo-600"></div>

    <script>
        let currentApiKey = localStorage.getItem('gemini_api_key') || "";
        const els = {
            textInput: document.getElementById('textInput'),
            promptInput: document.getElementById('promptInput'),
            generateBtn: document.getElementById('generateBtn'),
            magicWriteBtn: document.getElementById('magicWriteBtn'),
            voiceSelect: document.getElementById('voiceSelect'),
            styleSelect: document.getElementById('styleSelect'),
            tracksContainer: document.getElementById('tracksContainer'),
            noTracks: document.getElementById('noTracks'),
            body: document.getElementById('bodyTag'),
            apiKeyBtn: document.getElementById('apiKeyBtn'),
            apiKeyPopover: document.getElementById('apiKeyPopover'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            saveApiKey: document.getElementById('saveApiKey'),
            toast: document.getElementById('toast'),
            btnLoader: document.getElementById('btnLoader'),
            btnText: document.getElementById('btnText')
        };

        els.apiKeyBtn.onclick = () => els.apiKeyPopover.classList.toggle('hidden');
        els.saveApiKey.onclick = () => {
            currentApiKey = els.apiKeyInput.value.trim();
            localStorage.setItem('gemini_api_key', currentApiKey);
            els.apiKeyPopover.classList.add('hidden');
            showToast("המפתח נשמר!", "success");
        };

        function showToast(msg) {
            els.toast.innerText = msg;
            els.toast.style.opacity = "1";
            setTimeout(() => { els.toast.style.opacity = "0"; }, 3000);
        }

        async function apiCall(model, payload) {
            if (!currentApiKey) { showToast("נא להגדיר מפתח API"); return; }
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${currentApiKey}`;
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            return await response.json();
        }

        els.magicWriteBtn.onclick = async () => {
            const prompt = els.promptInput.value.trim();
            if(!prompt) return;
            document.getElementById('magicIcon').classList.add('hidden');
            document.getElementById('magicLoader').classList.remove('hidden');
            try {
                const data = await apiCall("gemini-1.5-flash", { contents: [{ parts: [{ text: `כתוב סקריפט קצר בעברית על: ${prompt}` }] }] });
                els.textInput.value = data.candidates[0].content.parts[0].text;
            } catch(e) {}
            document.getElementById('magicIcon').classList.remove('hidden');
            document.getElementById('magicLoader').classList.add('hidden');
        };

        els.generateBtn.onclick = async () => {
            const text = els.textInput.value.trim();
            if (!text) return;
            els.btnLoader.classList.remove('hidden');
            els.btnText.innerText = "מעבד...";
            try {
                const data = await apiCall("gemini-1.5-flash", {
                    contents: [{ parts: [{ text: `Say: ${text}` }] }],
                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: els.voiceSelect.value } } } }
                });
                const blob = pcmToWav(data.candidates[0].content.parts[0].inlineData.data, 24000);
                addTrack(blob, text.substring(0, 30));
                showToast("מוכן!");
            } catch (e) { showToast("שגיאה"); }
            els.btnLoader.classList.add('hidden');
            els.btnText.innerText = "הפק קריינות";
        };

        function pcmToWav(base64, rate) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const header = new ArrayBuffer(44);
            const v = new DataView(header);
            const s = (off, str) => { for (let i = 0; i < str.length; i++) v.setUint8(off + i, str.charCodeAt(i)); };
            s(0, 'RIFF'); v.setUint32(4, 36 + bytes.length, true); s(8, 'WAVE'); s(12, 'fmt '); v.setUint32(16, 16, true);
            v.setUint16(20, 1, true); v.setUint16(22, 1, true); v.setUint32(24, rate, true); v.setUint32(28, rate * 2, true);
            v.setUint16(32, 2, true); v.setUint16(34, 16, true); s(36, 'data'); v.setUint32(40, bytes.length, true);
            return new Blob([header, bytes], { type: 'audio/wav' });
        }

        function addTrack(blob, title) {
            els.noTracks.classList.add('hidden');
            const url = URL.createObjectURL(blob);
            const timestamp = Date.now();
            const div = document.createElement('div');
            div.className = "card p-4 rounded-2xl flex items-center gap-4 shadow-sm";
            div.innerHTML = `
                <div class="flex-grow min-w-0">
                    <div class="font-bold text-xs truncate dark:text-white">${title}...</div>
                </div>
                <audio src="${url}" controls class="h-8 w-32"></audio>
                <div class="flex gap-1">
                    <button onclick="uploadToYemotPrompt('${url}')" class="bg-green-600 text-white px-2 py-1 rounded text-[10px] font-bold hover:bg-green-700">☁️ ימות</button>
                    <a href="${url}" download="voice_${timestamp}.wav" class="bg-indigo-600 text-white px-2 py-1 rounded text-[10px] font-bold hover:bg-indigo-700">⬇️ הורדה</a>
                </div>
            `;
            els.tracksContainer.prepend(div);
        }

        async function uploadToYemotPrompt(url) {
            const blob = await fetch(url).then(r => r.blob());
            const token = prompt("טוקן (מערכת:סיסמה):");
            const path = prompt("נתיב (למשל: ivr2:1/001.wav):");
            if (!token || !path) return;
            const fd = new FormData();
            fd.append("token", token); fd.append("path", path); fd.append("file", blob, "v.wav");
            const res = await fetch("https://www.call2all.co.il/ym/api/UploadFile", { method: 'POST', body: fd });
            const data = await res.json();
            showToast(data.responseStatus === "OK" ? "הצליח!" : "נכשל");
        }

        document.getElementById('toggleDark').onclick = () => els.body.classList.toggle('dark-mode');
    </script>
</body>
</html>
