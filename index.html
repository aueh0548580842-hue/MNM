<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Test Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10 bg-slate-100">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <input id="key" type="password" placeholder="הכנס מפתח API כאן" class="w-full p-2 border mb-4">
        <textarea id="txt" class="w-full p-2 border mb-4">בדיקה אחת שתיים שלוש</textarea>
        <button onclick="generate()" id="btn" class="w-full bg-blue-600 text-white py-2 rounded">לחץ לבדיקת הפקה</button>
        <div id="status" class="mt-4 text-sm text-gray-600"></div>
        <div id="result" class="mt-4"></div>
    </div>

    <script>
        async function generate() {
            const key = document.getElementById('key').value;
            const text = document.getElementById('txt').value;
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            if(!key) return alert("חובה להכניס מפתח");
            
            status.innerText = "שולח בקשה ל-Google...";
            
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say: ${text}` }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"], 
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Zephyr" } } } 
                        }
                    })
                });
                
                const data = await response.json();
                if(data.candidates && data.candidates[0].content.parts[0].inlineData) {
                    const audioData = data.candidates[0].content.parts[0].inlineData.data;
                    result.innerHTML = `<audio src="data:audio/wav;base64,${audioData}" controls autoplay></audio>
                                       <br><a href="data:audio/wav;base64,${audioData}" download="test.wav" class="text-blue-500 underline">הורד קובץ</a>`;
                    status.innerText = "הצלחה!";
                } else {
                    status.innerText = "שגיאה: " + JSON.stringify(data);
                }
            } catch (e) {
                status.innerText = "שגיאת תקשורת: " + e.message;
            }
        }
    </script>
</body>
</html>
